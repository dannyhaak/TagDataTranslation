name: Release pub.dev

on:
  push:
    tags: ["v*"]

# OIDC token for pub.dev authentication (no secrets needed)
permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd sdk/flutter/tag_data_translation
          sed -i "s/^version: .*/version: ${VERSION}/" pubspec.yaml

      - name: Get dependencies
        run: cd sdk/flutter/tag_data_translation && flutter pub get

      - name: Analyze
        run: cd sdk/flutter/tag_data_translation && flutter analyze

      # Uses dart-lang/setup-dart's reusable workflow for OIDC-based publishing.
      # Requires: enable "publishing from GitHub Actions" on pub.dev package admin
      # with repository dannyhaak/TagDataTranslation and tag pattern v{{version}}.
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Publish to pub.dev
        run: cd sdk/flutter/tag_data_translation && dart pub publish --force
